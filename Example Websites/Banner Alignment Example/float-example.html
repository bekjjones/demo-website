<!DOCTYPE html>
<html>
<head>
<style>
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #333;
  display: block;
}

li.left {
  float: left;
}

li.middle {
  position: absolute;
  
}

li.right {
  float: right;
}

li a {
  display: inline-block;
  color: white;
  text-align: center;
  padding: 14px 16px;
  text-decoration: none;
}

li a:hover {
  background-color: #111;
}
</style>
</head>
<body>

<ul>
  <li class="left"><a href="#home">Home</a></li>
  <li class="middle"><a href="#news">News</a></li>
  <li class="right"><a href="#contact">Contact</a></li>
  <li class="right"><a href="#about">About</a></li>
</ul>

</body>
</html>
