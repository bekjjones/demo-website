<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Page with Design Grid Overlay</title>
    <style>
        /* Base page styling */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f5f7;
            padding: 20px;
        }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            background: #ffffff;
            height: 1500px; /* Force scrolling to test overlay */
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* --- THE GRID OVERLAY CODE --- */
        .grid-overlay {
            /* Fixes the grid over the entire viewport */
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            
            /* Ensures you can still click things underneath the grid */
            pointer-events: none; 
            
            /* High z-index keeps it on top of all page elements */
            z-index: 9999; 
            
            /* Centers the columns to match standard layouts */
            max-width: 1200px;
            left: 50%;
            transform: translateX(-50%);
            
            /* Establishes the grid layout */
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
            padding: 0 20px;
            box-sizing: border-box;
            
            /* Subtle visibility */
            opacity: 0.25; 
        }

        /* Column visual styling */
        .grid-overlay span {
            background-color: rgba(255, 0, 0, 0.4); /* Pink/Red translucent bars */
            border-left: 1px solid rgba(255, 0, 0, 0.8);
            border-right: 1px solid rgba(255, 0, 0, 0.8);
            height: 100%;
        }

        .parent-container-position {
            position: relative; /* Serves as the anchor point for the child */
        }

        .aligned-element-position {
            position: absolute;
            right: 50%;           /* Locks it to the right edge */
            top: 50%;
            transform: translateY(-50%); /* Perfect vertical centering */
        }
    </style>
</head>
<body>

    <!-- Toggleable Grid Container -->
    <div class="grid-overlay" id="layoutGrid">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <!-- Main Website Content -->
    <div class="content">
        <h1>Your Website Content</h1>
        <p>Press the <strong>"G"</strong> key on your keyboard to toggle the alignment grid overlay on and off.</p>
    </div>

<h1>Navigation</h1>

<h2>Positioned Buttons</h2>
<div class="parent-container-position">
  <button class="">Text 1</button>
  <button class="aligned-element-position">Text 2</button>
  <button class="float-right">Text 3</button>
  <button class="float-right">Text 4</button>
</div>

    <!-- JavaScript to toggle the grid visibility -->
    <script>
        document.addEventListener('keydown', function(event) {
            // Checks if the user pressed the 'G' or 'g' key
            if (event.key === 'g' || event.key === 'G') {
                const grid = document.getElementById('layoutGrid');
                if (grid.style.display === 'none') {
                    grid.style.display = 'grid';
                } else {
                    grid.style.display = 'none';
                }
            }
        });
    </script>

</body>
</html>
