<!DOCTYPE html>

<!-- 
  This source was found by Google search, using the following query:
  
  "rss feed javascript example without jquery"

  https://www.google.com/search?q=rss+feed+javascript+example+without+jquery
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanilla JS RSS Reader</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .feed-item { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .feed-item h3 { margin: 0 0 5px 0; }
        .feed-item a { color: #0066cc; text-decoration: none; }
        .feed-item a:hover { text-decoration: underline; }
        .feed-date { color: #666; font-size: 0.85rem; }
    </style>
</head>
<body>

    <h1>Latest News</h1>
    <!-- Container where RSS items will be displayed -->
    <div id="rss-container">Loading feed...</div>

    <script>
        // Use a CORS proxy if the target RSS server blocks direct client-side requests
        const RSS_URL = `https://feeds.megaphone.fm/GLT1412515089`;

        async function loadRSS() {
            const container = document.getElementById('rss-container');

            try {
                // 1. Fetch the raw XML string from the RSS feed URL
                const response = await fetch(RSS_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const xmlText = await response.text();

                // 2. Parse the XML string into a usable DOM object
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");

                // 3. Extract all <item> tags from the parsed XML
                const items = xmlDoc.querySelectorAll("item");
                let htmlOutput = "";

                // 4. Loop through the items and build the HTML payload
                items.forEach(el => {
                    const title = el.querySelector("title")?.textContent || "No Title";
                    const link = el.querySelector("link")?.textContent || "#";
                    const pubDate = el.querySelector("pubDate")?.textContent || "";
                    const description = el.querySelector("description")?.textContent || "";

                    htmlOutput += `
                        <div class="feed-item">
                            <h3><a href="${link}" target="_blank" rel="noopener">${title}</a></h3>
                            ${pubDate ? `<div class="feed-date">${new Date(pubDate).toLocaleDateString()}</div>` : ''}
                            <p>${description}</p>
                        </div>
                    `;
                });

                // 5. Inject the generated template into the DOM container
                container.innerHTML = htmlOutput || "<p>No entries found.</p>";

            } catch (error) {
                console.error('Error fetching or parsing the RSS feed:', error);
                container.innerHTML = `<p style="color: red;">Failed to load feed: ${error.message}</p>`;
            }
        }

        // Initialize the function once the DOM contents are ready
        document.addEventListener("DOMContentLoaded", loadRSS);
    </script>

</body>
</html>
